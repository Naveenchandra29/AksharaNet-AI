<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AksharaNet-AI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>AksharaNet-AI</h1>

        <p class="subtitle">
            Character-Level Neural Transliteration
        </p>

        <input
            type="text"
            id="inputText"
            placeholder="Enter English word..."
        >

        <button onclick="predictWord()">
            Transliterate
        </button>

        <div class="result">

            <h3>Hindi Output</h3>

            <p id="outputText">
                ---
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
